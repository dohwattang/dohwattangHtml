<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선배의 웹사이트</title>
    <style>
        /* 전체 화면에서 가운데 정렬을 유지하기 위한 기본 스타일 */
        body {
            max-width: 1200px;       /* 웹사이트의 최대 너비 설정 */
            margin: 0 auto;          /* 좌우 여백을 자동으로 두어 전체 중앙 정렬 */
            padding: 20px;           /* 화면 가장자리와의 여백 */
            font-family: Arial, sans-serif;
        }

        /* 제목을 가운데로 정렬 */
        header {
            text-align: center;
            margin-bottom: 40px;     /* 제목과 본문 사이의 간격 */
        }

        /* 하이퍼링크와 섹션들을 가로로 배치하기 위한 컨테이너 */
        .main-container {
            display: flex;           /* Flexbox 레이아웃 적용 */
            gap: 40px;               /* 사이드바와 본문 사이의 간격 */
            min-height: 400px;       /* 최소 높이 지정 */
        }

        /* 왼쪽 사이드바 (하이퍼링크 목록) */
        nav {
            flex: 1;                 /* 레이아웃 비율 (사이드바 영역) */
            max-width: 250px;        /* 사이드바의 최대 너비 제한 */
        }

        nav ul {
            list-style-type: none;   /* 목록 앞의 점(블릿) 제거 */
            padding: 0;
        }

        nav ul li {
            margin-bottom: 15px;     /* 링크 간의 상하 간격 */
        }

        /* 오른쪽 본문 영역 (섹션 1, 섹션 2) */
        main {
            flex: 3;                 /* 레이아웃 비율 (본문 영역을 더 넓게) */
            display: flex;
            flex-direction: column;  /* 섹션들을 위아래로 배치 */
            gap: 30px;               /* 섹션 1과 섹션 2 사이의 간격 */
        }

        section {
            border: 1px dashed #ccc; /* 내용 채우기 전 구분을 위한 임시 점선 border */
            padding: 20px;
        }

        /* 바닥글 스타일 */
        footer {
            margin-top: 50px;        /* 본문과의 간격 */
            text-align: center;      /* 바닥글 내용 가운데 정렬 */
            padding: 20px 0;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1>웹사이트 제목을 입력하세요</h1>
    </header>

    <div class="main-container">
        
        <nav>
            <h3>링크 목록</h3>
            <ul>
                <li><a href="#section1">섹션 1로 이동</a></li>
                <li><a href="#section2">섹션 2로 이동</a></li>
                <li><a href="https://github.com" target="_blank">외부 링크 (GitHub)</a></li>
            </ul>
        </nav>

        <main>
            <section id="section1">
                <h2>섹션 1 제목</h2>
                <p>여기에 섹션 1의 내용을 채워 넣으시면 됩니다.</p>
            </section>

            <section id="section2">
                <h2>섹션 2 제목</h2>
                <p>여기에 섹션 2의 내용을 채워 넣으시면 됩니다.</p>
            </section>
        </main>

    </div>

    <footer>
        <p>&copy; 2026 선배의 웹사이트. All rights reserved.</p>
    </footer>

</body>
</html>
