<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 화면</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
        }
        .login-box input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔒인증이 필요합니다</h2>
        <p>비밀번호를 입력해 주세요.</p>

        <input type="text" id="idInput" placeholder="아이디를 입력하세요" onkeydown="if(event.keyCode === 13) checkPassword();">
        <input type="password" id="passwordInput" placeholder="비밀번호 입력" onkeydown="if(event.keyCode === 13) checkPassword();">
        <br>
        <button onclick="checkPassword()" style="padding: 10px 20px; cursor: pointer;">입장하기</button>
        <h3 id="back">
            <a href="info.html" style="text-decoration: none; color: #7d4cdb;">🔙 뒤로가기</a>
        </h3>
    </div>
    <script>
        function checkPassword() {
            const inputId = document.getElementById('idInput').value;
            const inputPw = document.getElementById('passwordInput').value;

            const targetId = "dohwattang"; // 💡 사용할 아이디!
            const targetPassword = "428591"; // 임시 비밀번호 (선배가 원하는 걸로 바꾸세요!)

           if (inputId === targetId && inputPw === targetPassword) {
            alert("인증 성공! 개인 페이지로 이동합니다.");
            location.href = 'welcome.html'; 
        } else {
                alert("아이디 또는 비밀번호가 틀렸습니다, 선배! ❌");
        }
        }
    </script>

</body>
</html>
