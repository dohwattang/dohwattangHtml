<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 화면</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
        }
        .login-box input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔒인증이 필요합니다</h2>
        <p>비밀번호를 입력해 주세요.</p>

        <input type="text" id="idInput" placeholder="아이디를 입력하세요">
        <input type="password" id="passwordInput" placeholder="비밀번호 입력">
        <br>
        <button id="loginBtn" style="padding: 10px 20px; cursor: pointer;">입장하기</button>
        <h3 id="back">
            <a href="info.html" style="text-decoration: none; color: #7d4cdb;">🔙 뒤로가기</a>
        </h3>
        <button onclick="toggleDarkMode()" style="padding: 10px; cursor: pointer;">🌗 테마 변경</button>
    </div>

    <script type="module">
        // 1. 구글 SDK에서 필요한 핵심 기능(앱 초기화, 로그인 기능)을 불러옵니다.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        // 2. 선배가 발급받아 오신 파이어베이스 비밀 열쇠 주소 세팅!
        const firebaseConfig = {
            apiKey: "AIzaSyD3T8XPzMGr76F0HFF0BiHgcBYfwu2ueGY",
            authDomain: "dohwattang-web.firebaseapp.com",
            projectId: "dohwattang-web",
            storageBucket: "dohwattang-web.firebasestorage.app",
            messagingSenderId: "958803363287",
            appId: "1:958803363287:web:397502e8c4b35d9c13f792"
        };

        // 3. 파이어베이스와 인증 시스템을 가동합니다.
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. 로그인 처리를 담당하는 핵심 함수
        async function checkPassword() {
            const inputId = document.getElementById('idInput').value;
            const inputPw = document.getElementById('passwordInput').value;

            try {
                // 구글 서버에 직접 검증 요청을 보냅니다!
                const userCredential = await signInWithEmailAndPassword(auth, inputId, inputPw);
                const user = userCredential.user;

                alert(`인증 성공! 구글 서버 인증 회원님 환영합니다, 선배! 🎉`);
                location.href = 'mypage.html'; 
            } catch (error) {
                console.error("로그인 실패 오류 코드:", error.code);
                alert("아이디 또는 비밀번호가 구글 파이어베이스 서버 정보와 일치하지 않습니다, 선배! ❌");
            }
        }

        // 5. 💡 모듈 방식에서는 버튼 클릭과 엔터키 감지를 자바스크립트 안에서 연결해 주어야 합니다!
        document.getElementById('loginBtn').addEventListener('click', checkPassword);

        // 아이디창이나 비밀번호창에서 엔터(13번)를 누르면 로그인 함수 실행!
        const handleKeyDown = (event) => {
            if (event.keyCode === 13) {
                checkPassword();
            }
        };
        document.getElementById('idInput').addEventListener('keydown', handleKeyDown);
        document.getElementById('passwordInput').addEventListener('keydown', handleKeyDown);
        function toggleDarkMode() {
        // body 태그에 dark-theme 클래스가 없으면 넣고, 있으면 뺍니다!
            document.body.classList.toggle('dark-theme');
        }
    </script>
</body>
</html>
