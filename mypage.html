<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선배의 공식 홈페이지</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="mypage.css">
</head>
<body>
<div class="container">
        
        <nav>
            <h3>📁 카테고리 메뉴</h3>
            
            <div class="dropdown-menu">
                <button class="dropdown-btn" onclick="toggleDropdown('linksMenu', this)">
                    🔗 학교 사이트 <span class="arrow">▼</span>
                </button>
                <ul class="dropdown-content" id="linksMenu">
                        <li><a href="https://portal.yuhan.ac.kr/user/login.face" target="_blank">유한대학교 포털</a></li>
                        <li><a href="https://eclass.yuhan.ac.kr/login.php" target="_blank">유한대학교 e-class</a></li>
                        <li><a href="https://vr.yuhan.ac.kr/index.do" target="_blank">유한대 게임콘텐츠학과</a></li>
                </ul>
            </div>
            
            <div class="dropdown-menu">
                <button class="dropdown-btn" onclick="toggleDropdown('webMenu', this)">
                    🌐 웹 개발사이트 <span class="arrow">▼</span>
                </button>
                <ul class="dropdown-content" id="webMenu">
                    <li><a href="https://github.com/dohwattang">🛠️ 깃 허브(GitHub) 사이트</a></li>
                    <li><a href="https://console.firebase.google.com/u/2/project/dohwattang-web/overview?hl=ko">🐍 파이어베이스(Firebase) 사이트</a></li>
                </ul>
            </div>

            <div class="dropdown-menu">
                <button class="dropdown-btn" onclick="toggleDropdown('driveMenu', this)">
                    💿 드라이브 <span class="arrow">▼</span>
                </button>
                <ul class="dropdown-content" id="driveMenu">
                    <li><a href="https://drive.google.com/drive/my-drive?hl=ko" target="_blank">Google Drive</a></li>
                    <li><a href="https://nid.naver.com/nidlogin.login?url=https%3A%2F%2Fmybox.naver.com&realname=Y" target="_blank">네이버 MyBox</a></li>
                </ul>
            </div>
            
            <div class="dropdown-menu">
                <button class="dropdown-btn" onclick="toggleDropdown('projectMenu', this)">
                    💻 나의 프로젝트 <span class="arrow">▼</span>
                </button>
                <ul class="dropdown-content" id="projectMenu">
                    <li><a href="#none">🛠️ C언어 포트폴리오</a></li>
                    <li><a href="#none">🐍 파이썬 웹 크롤러</a></li>
                </ul>
            </div>

        </nav>

        <div class="calendar-section">
            <div class="calendar-header">
                <button id="prevMonth" style="cursor:pointer;">◀</button>
                <h2 id="monthTitle">2026년 7월</h2>
                <button id="nextMonth" style="cursor:pointer;">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>

        <div class="todo-section">
            <h3>📝 <span id="selectedDateText">날짜를 선택하세요</span>의 할 일</h3>
            <div class="todo-input-box">
                <input type="text" id="todoText" placeholder="할 일을 입력하세요">
                <button id="addTodoBtn">추가 📌</button>
            </div>
            <ul id="todoList" style="padding-left: 20px;"></ul>
        </div>

    </div>
    <footer>
            <div class="copyright">
                <p>&copy; 2026 선배의 포트폴리오. All rights reserved.</p>
        </div>
        </div>
    </footer>
    <!-- 💡 외부 JS 파일을 불러올 때도 똑같이 type="module"을 붙여줘야 합니다! -->

</body>
</html>
